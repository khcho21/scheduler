<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler - Smart Calendar</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
    
    <!-- Firebase SDK (Version 9 Compatibility) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="container animate-up">
        <header>
            <div class="header-left">
                <h1>Scheduler</h1>
                <div id="stat-month" style="color: var(--text-muted); font-weight: 600;">2026년 3월</div>
            </div>
            <div class="header-right">
                <button id="sync-settings-btn" class="btn-icon">☁️</button>
            </div>
        </header>

        <section class="dashboard">
            <div class="card">
                <h3>목표 근로시간</h3>
                <div class="value" id="base-hours">160h</div>
            </div>
            <div class="card">
                <h3>누적 근로시간</h3>
                <div class="value" id="total-hours">0h</div>
            </div>
            <div class="card">
                <h3>차이 (초과/부족)</h3>
                <div class="value" id="diff-hours">0h</div>
            </div>
        </section>

        <section class="calendar-container">
            <div class="calendar-header">
                <h2 id="calendar-title">2026년 3월</h2>
                <div class="calendar-nav">
                    <button class="nav-btn" id="prev-month">&lt;</button>
                    <button class="nav-btn" id="next-month">&gt;</button>
                </div>
            </div>
            <div class="calendar-grid">
                <div class="weekday">월</div>
                <div class="weekday">화</div>
                <div class="weekday">수</div>
                <div class="weekday">목</div>
                <div class="weekday">금</div>
            </div>
            <div id="calendar-body" class="calendar-grid">
                <!-- Day cells will be generated by app.js -->
            </div>
        </section>
    </div>

    <!-- Sync Settings Modal -->
    <div id="sync-modal" class="modal-overlay">
        <div class="modal animate-up">
            <h2>기기 간 동기화 설정</h2>
            <div class="form-group">
                <label>고유 동기화 코드</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="sync-code-input" placeholder="여기에 코드를 입력하세요" style="flex: 1;">
                    <button id="sync-code-gen" class="btn-secondary" style="flex: none; width: auto; padding: 0 1rem;">생성</button>
                </div>
                <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 0.5rem;">PC와 휴대폰에서 동일한 코드를 입력하면 실시간으로 연동됩니다.</p>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="sync-modal-close">닫기</button>
                <button class="btn-primary" id="sync-apply-btn">연결하기</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal animate-up">
            <h2 id="modal-date">2026-03-13</h2>
            <div class="form-group">
                <label>근태 종류</label>
                <select id="input-type" style="width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); color: white; padding: 0.75rem; border-radius: 0.5rem;">
                    <option value="">정상근무</option>
                    <option value="출장">출장</option>
                    <option value="휴가">휴가</option>
                    <option value="반차">반차(4h)</option>
                    <option value="공가">공가</option>
                    <option value="병가">병가</option>
                    <option value="봉사">봉사(4.5h)</option>
                    <option value="휴일">휴일</option>
                    <option value="최소근로">최소근로</option>
                </select>
            </div>
            <div class="form-group">
                <label>시무 기록 (예: 09:00)</label>
                <input type="text" id="input-clock-in" placeholder="HH:mm" maxlength="5">
            </div>
            <div class="form-group">
                <label>종무 기록 (예: 22:00)</label>
                <input type="text" id="input-clock-out" placeholder="HH:mm" maxlength="5">
            </div>
            <div class="form-group">
                <label>계획/메모</label>
                <input type="text" id="input-note" placeholder="예: 오전 휴가, 재택근무 등">
            </div>
            <div class="modal-actions" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem;">
                <button class="btn-danger" id="modal-delete">삭제</button>
                <button class="btn-secondary" id="modal-cancel">취소</button>
                <button class="btn-primary" id="modal-save">저장</button>
            </div>
        </div>
    </div>

    <script src="holidays.js?v=1.1"></script>
    <script src="app.js?v=1.1"></script>
</body>
</html>
